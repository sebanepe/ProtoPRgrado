version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: protouser
      POSTGRES_PASSWORD: protopass
      POSTGRES_DB: protodb
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4:7
    environment:
      PGADMIN_DEFAULT_EMAIL: sebanpb@gmail.com
      PGADMIN_DEFAULT_PASSWORD: Mariokart8$
    ports:
      - "8080:80"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://protouser:protopass@db:5432/protodb
      PYTHONUNBUFFERED: '1'
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend

volumes:
  db_data:
