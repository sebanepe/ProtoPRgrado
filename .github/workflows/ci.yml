name: CI - Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-html

      - name: Run tests (pytest)
        run: |
          mkdir -p reports
          pytest backend/app/tests --junitxml=reports/junit.xml --cov=backend --cov-report=xml --html=reports/report.html -q

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/junit.xml
            reports/report.html
            coverage.xml
